services:
  - type: web
    name: oxford-app
    env: node
    rootDir: .
    buildCommand: |
      yarn --cwd docs install --frozen-lockfile
      yarn --cwd docs build
      yarn --cwd docs/server install --frozen-lockfile
      yarn --cwd docs/server build
    startCommand: yarn --cwd docs/server start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: oxford
      - key: MONGODB_COLLECTION
        value: musics
      - key: MONGODB_USERS_COLLECTION
        value: users
      - key: MONGODB_PLAYLIST_COLLECTION
        value: musics
